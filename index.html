<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Planting Date Calculator — calculate days to maturity and harvest dates for your garden.">
  <title>Planting Date Calculator</title>
  <link rel="stylesheet" href="browser/styles.css">
</head>

<body>
  <div id="overall">

    <header>
      <img id="logo" src="./browser/images/Planting-Date-Calculator-Logo.png" alt="Planting Date Calculator Logo">
    </header>

    <main>
      <!-- Left veggie column (hidden on small screens) -->
      <div class="veggies veggies-left" aria-hidden="true">
        <img class="vegImage" src="./browser/images/a.png" alt="">
        <img class="vegImage" src="./browser/images/b.png" alt="">
        <img class="vegImage" src="./browser/images/c.png" alt="">
      </div>

      <!-- Center controls -->
      <div id="controls">
        <div id="c2" class="box">
          <label for="startDate">Choose Planting Day</label>
          <input type="date" id="startDate" name="startDate">
        </div>

        <div id="c3" class="box">
          <label for="endDate">Choose Harvest Day</label>
          <input type="date" id="endDate" name="endDate">
        </div>

        <div id="c4" class="box">
          <label for="daysDisplay">Days To Maturity</label>
          <input type="number" id="daysDisplay" name="days" min="0" placeholder="0">
          <button id="calcBtn" type="button">Calculate Harvest Date</button>
        </div>

        <!-- Bottom veggies (shown on small screens only) -->
        <div id="bottomVeggies" aria-hidden="true">
          <img class="vegImageBottom" src="./browser/images/b.png" alt="">
          <img class="vegImageBottom" src="./browser/images/a.png" alt="">
          <img class="vegImageBottom" src="./browser/images/d.png" alt="">
        </div>
      </div>

      <!-- Right veggie column (hidden on small screens) -->
      <div class="veggies veggies-right" aria-hidden="true">
        <img class="vegImageRight" src="./browser/images/d.png" alt="">
        <img class="vegImageRight" src="./browser/images/e.png" alt="">
        <img class="vegImageRight" src="./browser/images/f.png" alt="">
      </div>
    </main>

  </div>

  <script src="browser/js/app.js"></script>
</body>
</html>
